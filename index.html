<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给董雨轩 · 天天开心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            overflow: hidden;
            position: relative;
        }

        /* 星空 */
        canvas#starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* 光晕 */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 1;
        }
        .glow-1 {
            width: 500px; height: 500px;
            background: rgba(255, 107, 107, 0.12);
            top: -200px; right: -150px;
            animation: float1 10s ease-in-out infinite alternate;
        }
        .glow-2 {
            width: 450px; height: 450px;
            background: rgba(255, 214, 107, 0.08);
            bottom: -150px; left: -120px;
            animation: float2 12s ease-in-out infinite alternate;
        }
        .glow-3 {
            width: 300px; height: 300px;
            background: rgba(107, 187, 255, 0.06);
            top: 30%; left: 60%;
            animation: pulse 6s ease-in-out infinite alternate;
        }
        @keyframes float1 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(80px, 50px); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-60px, -40px); }
        }
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.4); }
        }

        /* 卡片 */
        .card {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 36px;
            padding: 4rem 3.5rem;
            max-width: 620px;
            width: 92%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
            animation: cardIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.85) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .ornament {
            font-size: 1.2rem;
            letter-spacing: 10px;
            color: rgba(255,215,0,0.35);
            margin-bottom: 1.2rem;
        }

        .name-title {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 0.3rem;
        }
        .name-title .fn { color: rgba(255,255,255,0.9); letter-spacing: 6px; }
        .name-title .ln { 
            background: linear-gradient(135deg, #FFD700, #FF6B6B, #FFD700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
            letter-spacing: 10px;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 1.3rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 6px;
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        hr.divider {
            border: none;
            height: 1px;
            width: 60%;
            margin: 0 auto 1.8rem;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
        }

        .hearts {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }
        .heart {
            font-size: 1.6rem;
            display: inline-block;
            animation: heartBounce 1.4s ease-in-out infinite;
        }
        .heart:nth-child(2) { animation-delay: 0.15s; }
        .heart:nth-child(3) { animation-delay: 0.3s; }
        .heart:nth-child(4) { animation-delay: 0.45s; }
        .heart:nth-child(5) { animation-delay: 0.6s; }
        .heart:nth-child(6) { animation-delay: 0.75s; }
        .heart:nth-child(7) { animation-delay: 0.9s; }
        @keyframes heartBounce {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.35); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
        }

        .message {
            line-height: 2.1;
            margin-bottom: 2rem;
        }
        .message p {
            color: rgba(255,255,255,0.65);
            font-size: 1rem;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.6s ease forwards;
        }
        .message p:nth-child(1) { animation-delay: 0.6s; }
        .message p:nth-child(2) { animation-delay: 0.9s; }
        .message p:nth-child(3) { animation-delay: 1.2s; }
        .message p:nth-child(4) { animation-delay: 1.5s; }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .message .highlight {
            color: #FFD700;
            font-weight: 600;
        }

        .smile-icon {
            font-size: 4.5rem;
            margin: 1rem 0 1.5rem;
            animation: bounce 2.2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .btn-surprise {
            background: linear-gradient(135deg, #FF6B6B, #EE5A24);
            border: none;
            color: white;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 35px rgba(255,107,107,0.3);
            position: relative;
            overflow: hidden;
        }
        .btn-surprise::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .btn-surprise:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 14px 45px rgba(255,107,107,0.5);
        }
        .btn-surprise:hover::before { opacity: 1; }
        .btn-surprise:active { transform: scale(0.97); }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.1);
            letter-spacing: 3px;
        }

        /* 彩纸 */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            top: -20px;
            width: 10px; height: 10px;
            opacity: 0;
            animation: fall var(--d) linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(var(--r)); opacity: 0; }
        }

        /* 惊喜弹窗 */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .overlay-box {
            background: linear-gradient(145deg, #1a1a3e, #2a1a4e);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 50px 120px rgba(0,0,0,0.6);
        }
        .overlay.show .overlay-box { transform: scale(1); }
        .overlay-box .big-icon { font-size: 5rem; margin-bottom: 1rem; }
        .overlay-box h2 { color: #FFD700; font-size: 1.8rem; margin-bottom: 0.8rem; letter-spacing: 3px; }
        .overlay-box p { color: rgba(255,255,255,0.65); line-height: 1.9; font-size: 0.95rem; margin-bottom: 1.5rem; }
        .btn-close-overlay {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .btn-close-overlay:hover { background: rgba(255,255,255,0.18); }

        @media (max-width: 500px) {
            .card { padding: 2.5rem 1.5rem; border-radius: 28px; }
            .name-title { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .smile-icon { font-size: 3.5rem; }
            .heart { font-size: 1.3rem; }
            .btn-surprise { padding: 0.8rem 2rem; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>

    <div class="card">
        <div class="ornament">✦ ✦ ✦</div>

        <div class="name-title">
            <span class="ln">祝</span>
            <span class="fn">董雨轩</span>
        </div>
        <div class="subtitle">☆ 天 天 开 心 ☆</div>
        <hr class="divider">

        <div class="hearts">
            <span class="heart">💖</span>
            <span class="heart">💛</span>
            <span class="heart">💜</span>
            <span class="heart">💚</span>
            <span class="heart">💙</span>
            <span class="heart">🧡</span>
            <span class="heart">💖</span>
        </div>

        <div class="message">
            <p>愿你的每一天都充满阳光</p>
            <p>笑容永远像星星一样<span class="highlight">闪亮</span></p>
            <p>不管今天是什么天气</p>
            <p>你都是这世界上 <span class="highlight">最特别的人</span> ✨</p>
        </div>

        <div class="smile-icon">😊</div>

        <button class="btn-surprise" onclick="showSurprise()">点 击 收 获 惊 喜 💫</button>
        <div class="footer-note">— made with ❤️ —</div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <div class="overlay" id="surpriseOverlay">
        <div class="overlay-box">
            <div class="big-icon">🎉</div>
            <h2>董雨轩，天天开心！</h2>
            <p>
                希望你每天都有好吃的<br>
                每晚都能睡个好觉<br>
                遇到的人都温暖<br>
                想做的事都顺利<br><br>
                你值得世间所有的美好 🌟
            </p>
            <button class="btn-close-overlay" onclick="hideSurprise()">收到啦 💕</button>
        </div>
    </div>

    <script>
        // 星空粒子
        (function() {
            const canvas = document.getElementById("starfield");
            const ctx = canvas.getContext("2d");
            let w, h, stars = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                stars = [];
                for (let i = 0; i < 180; i++) {
                    stars.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        r: Math.random() * 2 + 0.3,
                        a: Math.random(),
                        da: (Math.random() - 0.5) * 0.005,
                        dx: (Math.random() - 0.5) * 0.15,
                        dy: (Math.random() - 0.5) * 0.15
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, w, h);
                for (const s of stars) {
                    s.a += s.da;
                    if (s.a > 1) s.a = 1;
                    if (s.a < 0.1) s.a = 0.1;
                    s.x += s.dx;
                    s.y += s.dy;
                    if (s.x < 0) s.x = w;
                    if (s.x > w) s.x = 0;
                    if (s.y < 0) s.y = h;
                    if (s.y > h) s.y = 0;

                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255,255,255," + s.a + ")";
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener("resize", resize);
            resize();
            draw();
        })();

        // 彩纸
        function launchConfetti() {
            const c = document.getElementById("confettiContainer");
            const colors = ["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#FF6BDF","#FF9F43","#A29BFE","#FD79A8"];
            const shapes = ["●","■","▲","★","♦"];
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const el = document.createElement("div");
                    el.className = "confetti-piece";
                    el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                    el.style.left = Math.random() * 100 + "%";
                    el.style.color = colors[Math.floor(Math.random() * colors.length)];
                    el.style.fontSize = (Math.random() * 16 + 8) + "px";
                    el.style.setProperty("--d", (Math.random() * 2 + 2) + "s");
                    el.style.setProperty("--r", (Math.random() * 720 + 360) + "deg");
                    c.appendChild(el);
                    setTimeout(() => el.remove(), 4500);
                }, i * 25);
            }
        }

        function showSurprise() {
            launchConfetti();
            setTimeout(() => document.getElementById("surpriseOverlay").classList.add("show"), 400);
        }

        function hideSurprise() {
            document.getElementById("surpriseOverlay").classList.remove("show");
            launchConfetti();
        }

        document.getElementById("surpriseOverlay").addEventListener("click", function(e) {
            if (e.target === this) hideSurprise();
        });
    </script>
</body>
</html>
