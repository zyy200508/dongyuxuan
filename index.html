<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给董雨轩 · 天天开心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            overflow: hidden;
            position: relative;
        }

        /* ===== 星空背景 ===== */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== 流星 ===== */
        .shooting-star {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.3);
            animation: shoot 3s ease-out infinite;
            z-index: 1;
            opacity: 0;
        }

        .shooting-star:nth-child(1) { top: 15%; left: 80%; animation-delay: 1s; }
        .shooting-star:nth-child(2) { top: 30%; left: 90%; animation-delay: 4s; }
        .shooting-star:nth-child(3) { top: 10%; left: 70%; animation-delay: 7s; }

        .shooting-star::after {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 1px;
            background: linear-gradient(to left, rgba(255,255,255,0.6), transparent);
            right: 3px;
        }

        @keyframes shoot {
            0% { transform: translate(0, 0); opacity: 0; }
            5% { opacity: 1; }
            30% { transform: translate(-200px, 200px); opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* ===== 主卡片 ===== */
        .card {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 4rem 3.5rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ===== 光晕 ===== */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: rgba(255, 107, 107, 0.15);
            top: -150px;
            right: -150px;
            animation: float1 8s ease-in-out infinite alternate;
        }

        .glow-2 {
            width: 350px;
            height: 350px;
            background: rgba(255, 214, 107, 0.1);
            bottom: -120px;
            left: -120px;
            animation: float2 10s ease-in-out infinite alternate;
        }

        .glow-3 {
            width: 250px;
            height: 250px;
            background: rgba(107, 187, 255, 0.08);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 6s ease-in-out infinite alternate;
        }

        @keyframes float1 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 40px); }
        }

        @keyframes float2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -30px); }
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* ===== 顶部装饰 ===== */
        .top-ornament {
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            letter-spacing: 8px;
            color: rgba(255,215,0,0.5);
        }

        /* ===== 标题 ===== */
        .main-title {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FF6B6B, #FFD700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
            line-height: 1.3;
            margin-bottom: 0.8rem;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ===== 副标题 ===== */
        .subtitle {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* ===== 心心 ===== */
        .hearts {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .heart {
            font-size: 1.8rem;
            display: inline-block;
            animation: heartBeat 1.4s ease-in-out infinite;
        }

        .heart:nth-child(2) { animation-delay: 0.2s; }
        .heart:nth-child(3) { animation-delay: 0.4s; }
        .heart:nth-child(4) { animation-delay: 0.6s; }
        .heart:nth-child(5) { animation-delay: 0.8s; }
        .heart:nth-child(6) { animation-delay: 1.0s; }
        .heart:nth-child(7) { animation-delay: 1.2s; }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
        }

        /* ===== 祝福语 ===== */
        .blessing {
            color: rgba(255,255,255,0.75);
            font-size: 1rem;
            line-height: 2;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .blessing span {
            display: inline-block;
            opacity: 0;
            animation: fadeInWord 0.6s ease forwards;
        }

        .blessing span:nth-child(1) { animation-delay: 0.8s; }
        .blessing span:nth-child(2) { animation-delay: 1.0s; }
        .blessing span:nth-child(3) { animation-delay: 1.2s; }
        .blessing span:nth-child(4) { animation-delay: 1.4s; }
        .blessing span:nth-child(5) { animation-delay: 1.6s; }
        .blessing span:nth-child(6) { animation-delay: 1.8s; }
        .blessing span:nth-child(7) { animation-delay: 2.0s; }
        .blessing span:nth-child(8) { animation-delay: 2.2s; }

        @keyframes fadeInWord {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(8px); }
        }

        /* ===== 笑脸区域 ===== */
        .smile-area {
            margin: 1.5rem 0;
            font-size: 4rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* ===== 按钮 ===== */
        .btn-surprise {
            background: linear-gradient(135deg, #FF6B6B, #EE5A24);
            border: none;
            color: white;
            padding: 0.9rem 2.8rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(255,107,107,0.3);
            margin-top: 0.5rem;
        }

        .btn-surprise:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(255,107,107,0.5);
        }

        .btn-surprise:active {
            transform: scale(0.98);
        }

        /* ===== 彩色纸屑 ===== */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            top: -20px;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confettiFall var(--fall-duration) linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(var(--spin)); opacity: 0; }
        }

        /* ===== 弹窗消息 ===== */
        .surprise-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .surprise-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .surprise-box {
            background: linear-gradient(145deg, #1a1a3e, #2a1a4e);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .surprise-overlay.show .surprise-box {
            transform: scale(1);
        }

        .surprise-box .big-icon {
            font-size: 4.5rem;
            margin-bottom: 1rem;
        }

        .surprise-box h2 {
            color: #FFD700;
            font-size: 1.8rem;
            margin-bottom: 0.8rem;
        }

        .surprise-box p {
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .btn-close-surprise {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .btn-close-surprise:hover {
            background: rgba(255,255,255,0.2);
        }

        /* ===== 底部 ===== */
        .footer-text {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 500px) {
            .card {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
            }
            .main-title {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 0.9rem;
            }
            .smile-area {
                font-size: 3rem;
            }
            .heart {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- 星空 -->
    <div id="stars"></div>

    <!-- 流星 -->
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>

    <!-- 光晕 -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>

    <!-- 主卡片 -->
    <div class="card">
        <div class="top-ornament">✦ ✦ ✦</div>

        <div class="main-title">祝 董雨轩</div>
        <div class="subtitle">☆ 天 天 开 心 ☆</div>

        <div class="hearts">
            <span class="heart">💖</span>
            <span class="heart">💛</span>
            <span class="heart">💜</span>
            <span class="heart">💚</span>
            <span class="heart">💙</span>
            <span class="heart">🧡</span>
            <span class="heart">💖</span>
        </div>

        <div class="blessing">
            <span>愿 你 的 每 一 天</span>
            <span>都 充 满 阳 光</span>
            <span>笑 容 永 远 灿 烂</span>
            <span>世 界 很 大</span>
            <span>但 你 的 快 乐</span>
            <span>是 最 重 要 的 事</span>
            <span>✨</span>
        </div>

        <div class="smile-area">😊</div>

        <button class="btn-surprise" onclick="showSurprise()">点 击 收 获 惊 喜 💫</button>

        <div class="footer-text">— made with ❤️ —</div>
    </div>

    <!-- 纸屑容器 -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- 惊喜弹窗 -->
    <div class="surprise-overlay" id="surpriseOverlay">
        <div class="surprise-box">
            <div class="big-icon">🎉</div>
            <h2>董雨轩，天天开心！</h2>
            <p>
                希望你每天都有好吃的<br>
                每晚都能睡个好觉<br>
                遇到的人都温暖<br>
                想做的事都顺利<br><br>
                不管今天是晴天还是下雨<br>
                你都是这个世界上最棒的人 🌟
            </p>
            <button class="btn-close-surprise" onclick="hideSurprise()">收到啦 💕</button>
        </div>
    </div>

    <script>
        // ===== 生成星空 =====
        (function() {
            const container = document.getElementById("stars");
            for (let i = 0; i < 200; i++) {
                const star = document.createElement("div");
                star.className = "star";
                const size = Math.random() * 3 + 1;
                star.style.width = size + "px";
                star.style.height = size + "px";
                star.style.left = Math.random() * 100 + "%";
                star.style.top = Math.random() * 100 + "%";
                star.style.setProperty("--duration", (Math.random() * 3 + 2) + "s");
                star.style.animationDelay = Math.random() * 5 + "s";
                container.appendChild(star);
            }
        })();

        // ===== 彩色纸屑 =====
        function launchConfetti() {
            const container = document.getElementById("confettiContainer");
            const colors = ["#FF6B6B", "#FFD93D", "#6BCB77", "#4D96FF", "#FF6BDF", "#FF9F43", "#A29BFE", "#FD79A8"];
            const shapes = ["●", "■", "▲", "★", "♦"];

            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const el = document.createElement("div");
                    el.className = "confetti";
                    el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                    el.style.left = Math.random() * 100 + "%";
                    el.style.color = colors[Math.floor(Math.random() * colors.length)];
                    el.style.fontSize = (Math.random() * 16 + 8) + "px";
                    el.style.setProperty("--fall-duration", (Math.random() * 2 + 2) + "s");
                    el.style.setProperty("--spin", (Math.random() * 720 + 360) + "deg");
                    container.appendChild(el);

                    setTimeout(() => el.remove(), 4000);
                }, i * 30);
            }
        }

        // ===== 惊喜弹窗 =====
        function showSurprise() {
            launchConfetti();
            setTimeout(() => {
                document.getElementById("surpriseOverlay").classList.add("show");
            }, 300);
        }

        function hideSurprise() {
            document.getElementById("surpriseOverlay").classList.remove("show");
            launchConfetti();
        }

        // ===== 点击背景关闭弹窗 =====
        document.getElementById("surpriseOverlay").addEventListener("click", function(e) {
            if (e.target === this) hideSurprise();
        });
    </script>
</body>
</html>
